<script>
'use strict';

// ═══════════════════════════════════════════════
//  V12 THEME — Purple-Blue Lock-On
// ═══════════════════════════════════════════════
const THEME = {
  purpleBluePeak: '#9b6eff',
  purpleBlueGlow: '#00d4ff'
};

function applyV12Theme() {
  document.documentElement.style.setProperty('--lock-peak', THEME.purpleBluePeak);
  document.documentElement.style.setProperty('--lock-glow', THEME.purpleBlueGlow);
}

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const S = {
  heading: 0,
  targetHeading: 0,
  userLat: 52.135,
  userLon: -0.467,
  pois: [],
  fov: 90,
  centreZone: 9,
  edgeZone: 35,
  demo: false,
  race: RACES.find(r => r.id === 'human') || RACES[0],
  xp: 0,
  xpLevel: 1,
  discovered: new Set(),
  lockedPoi: null,
  attuneTimer: null,
  attuneProgress: 0,
};

// ═══════════════════════════════════════════════
//  COMPASS TAPE (your original setup)
// ═══════════════════════════════════════════════
const tape = document.getElementById('compass-tape');
const labels = [];
for(let i = 0; i < 360; i += 5){
  let l = i%90===0 ? ['N','E','S','W'][Math.floor(i/90)] : 
          i%45===0 ? ['NE','SE','SW','NW'][[45,135,225,315].indexOf(i)] : 
          i%10===0 ? String(i).padStart(3,'0') : '·';
  labels.push(l);
}
for(let r = 0; r < 3; r++) {
  labels.forEach(l => {
    const e = document.createElement('div');
    e.className = 'c-tick' + (l.match(/^[NSEW]$/) ? ' card' : '');
    e.textContent = l;
    tape.appendChild(e);
  });
}
const totalTape = labels.length * 26;

// ═══════════════════════════════════════════════
//  STONE FRICTION ENGINE
// ═══════════════════════════════════════════════
let compassVelocity = 0;
let smoothedHeading = 0;
let compassInitDone = false;
let lastMarkerUpdate = 0;

function tickCompass() {
  if (!compassInitDone) {
    requestAnimationFrame(tickCompass);
    return;
  }

  let diff = S.targetHeading - smoothedHeading;
  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;

  const spring = 0.068;
  const friction = 0.79;

  compassVelocity = (compassVelocity + diff * spring) * friction;
  smoothedHeading = (smoothedHeading + compassVelocity + 360) % 360;
  S.heading = smoothedHeading;

  const off = (smoothedHeading / 360) * totalTape;
  tape.style.transform = `translateX(calc(-50% - ${off}px + ${totalTape}px))`;

  document.getElementById('heading-txt').textContent = 
    Math.round(smoothedHeading).toString().padStart(3,'0') + '° ' + dirLabel(smoothedHeading);

  const now = performance.now();
  if (now - lastMarkerUpdate > 50) {
    lastMarkerUpdate = now;
    checkCentreLock();
    if (typeof updateMarkers === 'function') updateMarkers();
  }

  requestAnimationFrame(tickCompass);
}

// ═══════════════════════════════════════════════
//  SENSOR
// ═══════════════════════════════════════════════
let compassStarted = false;
let gotReading = false;

function correctHeading(e) {
  let h = e.webkitCompassHeading !== undefined ? e.webkitCompassHeading : (360 - (e.alpha || 0)) % 360;
  const screenAngle = screen.orientation?.angle || window.orientation || 0;
  return (h + screenAngle + 360) % 360;
}

function attachOrientation() {
  if (compassStarted) return;
  compassStarted = true;

  window.addEventListener('deviceorientation', e => {
    if (!e || (e.alpha === null && e.webkitCompassHeading === null)) return;
    gotReading = true;
    S.targetHeading = correctHeading(e);
    if (!compassInitDone) {
      smoothedHeading = S.targetHeading;
      compassInitDone = true;
    }
  });

  setTimeout(() => { if (!gotReading) startDemoCompass(); }, 2500);
}

function startDemoCompass() {
  S.demo = true;
  const banner = document.getElementById('demo-banner');
  if (banner) banner.classList.add('show');
  compassInitDone = true;
  let h = 40, dir = 1;
  setInterval(() => {
    h += dir * 0.4;
    if (h > 130 || h < 10) dir *= -1;
    S.targetHeading = h;
  }, 50);
}

async function startCompassReal() {
  if (typeof DeviceOrientationEvent !== 'undefined' && DeviceOrientationEvent.requestPermission) {
    try {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm === 'granted') attachOrientation();
      else startDemoCompass();
    } catch {
      startDemoCompass();
    }
  } else {
    attachOrientation();
  }
}

// ═══════════════════════════════════════════════
//  PURPLE-BLUE LOCK-ON
// ═══════════════════════════════════════════════
let lastLockedId = null;
const ATTUNE_HOLD_MS = 2800;

function checkCentreLock() {
  let nearest = null;
  let nearestAbs = 999;

  S.pois.forEach(poi => {
    let rel = ((poi.bearing - S.heading + 540) % 360) - 180;
    const abs = Math.abs(rel);
    if (abs < nearestAbs && abs < S.centreZone) {
      nearestAbs = abs;
      nearest = poi;
    }
  });

  const xhair = document.getElementById('xhair');
  const banner = document.getElementById('lock-banner');
  const arc = document.getElementById('attune-arc');
  const holdEl = document.getElementById('attune-hold');

  if (nearest) {
    xhair.classList.add('locked');
    xhair.style.setProperty('--xhair-color', THEME.purpleBluePeak);

    document.querySelectorAll('.poi-marker').forEach(el => {
      el.classList.toggle('centre-locked', el.id === 'pm-' + S.pois.indexOf(nearest));
    });

    document.getElementById('lb-name').textContent = nearest.name || '—';
    document.getElementById('lb-type').textContent = nearest.label || '—';
    document.getElementById('lb-dist').textContent = 
      (typeof fmt === 'function' ? fmt(nearest.km) : (nearest.km||'?') + 'km') + 
      ' · ' + Math.round(nearest.bearing) + '° ' + (typeof dirLabel === 'function' ? dirLabel(nearest.bearing) : '');

    banner.classList.add('show');

    if (nearest.id !== lastLockedId) {
      lastLockedId = nearest.id;
      triggerLockRings();
      if (typeof playLockThud === 'function') playLockThud();
      if (typeof haptic === 'function') haptic([30]);

      clearInterval(S.attuneTimer);
      S.attuneProgress = 0;
      if (arc) {
        arc.style.stroke = THEME.purpleBluePeak;
        arc.style.filter = `drop-shadow(0 0 8px ${THEME.purpleBlueGlow})`;
      }
      holdEl.classList.add('show');

      const start = Date.now();
      S.attuneTimer = setInterval(() => {
        const prog = Math.min((Date.now() - start) / ATTUNE_HOLD_MS, 1);
        S.attuneProgress = prog;
        if (arc) arc.style.strokeDasharray = (prog * 207) + ' 207';

        if (prog >= 1) {
          clearInterval(S.attuneTimer);
          holdEl.classList.remove('show');
          if (typeof grantDiscoveryXP === 'function') grantDiscoveryXP(nearest);
        }
      }, 50);
    }
    S.lockedPoi = nearest;
  } else {
    xhair.classList.remove('locked');
    banner.classList.remove('show');
    holdEl.classList.remove('show');
    document.querySelectorAll('.poi-marker').forEach(el => el.classList.remove('centre-locked'));
    if (lastLockedId !== null) clearInterval(S.attuneTimer);
    lastLockedId = null;
    S.lockedPoi = null;
  }
}

function triggerLockRings() {
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const r = document.createElement('div');
      r.className = 'lock-ring';
      r.style.borderColor = THEME.purpleBluePeak;
      r.style.boxShadow = `0 0 30px ${THEME.purpleBlueGlow}`;
      r.style.animationDelay = (i * 0.1) + 's';
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 1300);
    }, i * 90);
  }
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  applyV12Theme();
  requestAnimationFrame(tickCompass);
  startCompassReal();

  // Safe calls to your original functions
  if (typeof buildPermRow === 'function') buildPermRow();
});
</script>
