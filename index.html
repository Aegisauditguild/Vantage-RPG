<script>
'use strict';

// ═══════════════════════════════════════════════
//  V12 THEME — Purple-Blue Lock-On
// ═══════════════════════════════════════════════
const THEME = {
  gold: '#c9a84c',
  goldB: '#f0c040',
  purpleBlueBase: '#5a2d91',     // Deep Indigo
  purpleBluePeak: '#9b6eff',     // Vibrant Purple-Blue
  purpleBlueGlow: '#00d4ff',     // Teal-blue accent for haze
  hazeColor: 'rgba(155, 110, 255, 0.65)'
};

// Update CSS variables for new lock-on color
function applyV12Theme() {
  document.documentElement.style.setProperty('--lock-base', THEME.purpleBlueBase);
  document.documentElement.style.setProperty('--lock-peak', THEME.purpleBluePeak);
  document.documentElement.style.setProperty('--lock-glow', THEME.purpleBlueGlow);
}
applyV12Theme();

// ═══════════════════════════════════════════════
//  RACE DATA (unchanged for now)
// ═══════════════════════════════════════════════
const RACES = [ /* ... your existing RACES array ... */ ];
// (Keep your full RACES array here - I omitted it for brevity)

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const S = {
  heading: 0,
  targetHeading: 0,
  smoothedHeading: 0,
  velocity: 0,                    // For inertia
  userLat: 52.135,
  userLon: -0.467,
  locationReady: false,
  pois: [],
  fov: 90,                        // Expanded FOV as discussed
  centreZone: 9,                  // Magnetic deadzone (degrees)
  edgeZone: 35,
  demo: false,
  race: RACES.find(r => r.id === 'human'),
  xp: 0,
  xpLevel: 1,
  discovered: new Set(),
  lockedPoi: null,
  attuneTimer: null,
  attuneProgress: 0,
};

// ═══════════════════════════════════════════════
//  STONE FRICTION ENGINE — Heavy Momentum
// ═══════════════════════════════════════════════
let _compassRAF = null;
let _lastMarkerUpdate = 0;

function tickCompass() {
  if (!_compassInitDone) {
    _compassRAF = requestAnimationFrame(tickCompass);
    return;
  }

  const diff = ((S.targetHeading - S.smoothedHeading + 540) % 360) - 180;

  // Strong spring + friction for "stone disk on oiled spindle" feel
  const spring = 0.065;
  const friction = 0.78;        // Higher = more damping (heavier feel)
  const overtravelDamping = 0.92;

  S.velocity = (S.velocity + diff * spring) * friction;
  S.smoothedHeading = (S.smoothedHeading + S.velocity + 360) % 360;

  // Gentle settle bounce when slowing down
  if (Math.abs(S.velocity) < 0.8 && Math.abs(diff) < 2) {
    S.velocity *= 0.65;   // extra damping near target
  }

  S.heading = S.smoothedHeading;

  // Update compass tape
  const off = (S.smoothedHeading / 360) * totalTape;
  tape.style.transform = `translateX(calc(-50% - ${off}px + ${totalTape}px))`;

  document.getElementById('heading-txt').textContent = 
    Math.round(S.smoothedHeading).toString().padStart(3, '0') + '° ' + dirLabel(S.smoothedHeading);
  document.getElementById('hdg-stat').textContent = Math.round(S.smoothedHeading) + '°';

  const now = performance.now();
  if (now - _lastMarkerUpdate > 45) {
    _lastMarkerUpdate = now;
    checkCentreLock();
    updateMarkers();
  }

  // Stone grind sound on fast rotation
  if (Math.abs(S.velocity) > 2.2) playGrind();

  _compassRAF = requestAnimationFrame(tickCompass);
}

// Initialize compass
let _compassInitDone = false;
requestAnimationFrame(tickCompass);

// ═══════════════════════════════════════════════
//  COMPASS SENSOR — Improved correction
// ═══════════════════════════════════════════════
let compassStarted = false, gotReading = false;

function correctHeading(e) {
  let h = 0;
  if (e.webkitCompassHeading !== undefined) {
    h = e.webkitCompassHeading;                    // iOS
  } else {
    h = (360 - (e.alpha || 0)) % 360;              // Android
  }

  const screenAngle = (screen.orientation?.angle) || window.orientation || 0;
  h = (h + screenAngle + 360) % 360;
  return h;
}

function attachOrientation() {
  if (compassStarted) return;
  compassStarted = true;

  window.addEventListener('deviceorientation', e => {
    if (e.alpha === null && e.webkitCompassHeading === null) return;
    gotReading = true;
    S.targetHeading = correctHeading(e);
    if (!_compassInitDone) {
      S.smoothedHeading = S.targetHeading;
      _compassInitDone = true;
    }
  }, true);

  setTimeout(() => { if (!gotReading) startDemoCompass(); }, 2800);
}

async function startCompassReal() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const permission = await DeviceOrientationEvent.requestPermission();
      if (permission === 'granted') attachOrientation();
      else startDemoCompass();
    } catch (err) {
      startDemoCompass();
    }
  } else {
    attachOrientation();
  }
}

function startDemoCompass() {
  S.demo = true;
  document.getElementById('demo-banner').classList.add('show');
  _compassInitDone = true;
  let h = 40, dir = 1;
  setInterval(() => {
    h += dir * 0.45;
    if (h > 135 || h < 5) dir *= -1;
    S.targetHeading = h;
  }, 45);
}

// ═══════════════════════════════════════════════
//  CENTRE LOCK & PURPLE-BLUE ATTUNEMENT
// ═══════════════════════════════════════════════
let lastLockedId = null;
const ATTUNE_HOLD_MS = 2800;

function checkCentreLock() {
  let nearest = null;
  let nearestAbs = 999;

  S.pois.forEach(poi => {
    let rel = ((poi.bearing - S.heading + 540) % 360) - 180;
    const abs = Math.abs(rel);
    if (abs < nearestAbs && abs < S.centreZone) {
      nearestAbs = abs;
      nearest = poi;
    }
  });

  const xhair = document.getElementById('xhair');
  const banner = document.getElementById('lock-banner');
  const arc = document.getElementById('attune-arc');
  const holdEl = document.getElementById('attune-hold');

  if (nearest) {
    // === PURPLE-BLUE LOCK-ON ===
    xhair.classList.add('locked');
    xhair.style.setProperty('--lock-color', THEME.purpleBluePeak);

    document.querySelectorAll('.poi-marker').forEach(el => {
      el.classList.toggle('centre-locked', el.id === 'pm-' + S.pois.indexOf(nearest));
    });

    // Update banner
    document.getElementById('lb-name').textContent = nearest.name;
    document.getElementById('lb-type').textContent = nearest.label;
    document.getElementById('lb-dist').textContent = fmt(nearest.km) + ' · ' + Math.round(nearest.bearing) + '° ' + dirLabel(nearest.bearing);
    banner.classList.add('show');

    if (nearest.id !== lastLockedId) {
      lastLockedId = nearest.id;
      triggerLockRings();           // We'll update rings to purple-blue too
      playLockThud();
      playSting(['A4', 'D5']);

      clearInterval(S.attuneTimer);
      S.attuneProgress = 0;
      arc.style.stroke = THEME.purpleBluePeak;
      arc.style.filter = `drop-shadow(0 0 6px ${THEME.purpleBlueGlow})`;
      holdEl.classList.add('show');

      const start = Date.now();
      S.attuneTimer = setInterval(() => {
        const elapsed = Date.now() - start;
        const prog = Math.min(elapsed / ATTUNE_HOLD_MS, 1);
        S.attuneProgress = prog;
        arc.style.strokeDasharray = (prog * 207) + ' 207';

        if (prog >= 1) {
          clearInterval(S.attuneTimer);
          holdEl.classList.remove('show');
          grantDiscoveryXP(nearest);
        }
      }, 50);
    }
    S.lockedPoi = nearest;
  } else {
    xhair.classList.remove('locked');
    banner.classList.remove('show');
    holdEl.classList.remove('show');
    document.querySelectorAll('.poi-marker').forEach(el => el.classList.remove('centre-locked'));
    if (lastLockedId !== null) clearInterval(S.attuneTimer);
    lastLockedId = null;
    S.lockedPoi = null;
  }
}

// Update lock rings to use purple-blue
function triggerLockRings() {
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const r = document.createElement('div');
      r.className = 'lock-ring';
      r.style.borderColor = THEME.purpleBluePeak;
      r.style.boxShadow = `0 0 25px ${THEME.purpleBlueGlow}`;
      r.style.animationDelay = (i * 0.12) + 's';
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 1200);
    }, i * 110);
  }
}

// Keep the rest of your existing functions (fetchOSM, updateMarkers, showDetail, etc.)
// Just make sure to call startCompassReal() at the end instead of the old one.

document.addEventListener('DOMContentLoaded', () => {
  applyV12Theme();
  startCompassReal();           // ← Improved version
  // ... rest of your initialization code
});
</script>
